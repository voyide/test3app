name: pro_test_app
description: Professional grade test taking application.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # State Management
  provider: ^6.1.2
  # Local Storage Persistence
  shared_preferences: ^2.2.3
  # JSON File Importing
  file_picker: ^8.0.3
  # Markdown rendering for questions and choices
  flutter_markdown: ^0.7.2
  # Advanced Stats / Charts
  fl_chart: ^0.68.0
  # Date Formatting
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
